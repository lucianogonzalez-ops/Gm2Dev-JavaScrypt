<head>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const titulo = document.querySelector("h1");
      console.log(titulo); // funciona
    });
  </script>

</head>
<body>
  <h1>Hola, mundo</h1>  
</body>

<!-- El codigo funciona ahora , ya que la funcion del document ,addEventListener, espera que se cargue  y una vez que tiene todos los elementos necesarios , realiza la accion.
 en este caso siendo que guarda el titulo en un const y luego lo -->
