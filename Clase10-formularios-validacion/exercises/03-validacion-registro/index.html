<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 03 — Formulario de registro</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 440px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .campo {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }
    input {
      display: block;
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .error {
      color: red;
      font-size: 0.9rem;
      min-height: 1.2em;
      display: block;
      margin-top: 4px;
    }
    button {
      padding: 10px 24px;
      font-size: 1rem;
      cursor: pointer;
    }
    #exito {
      margin-top: 20px;
      color: #1a7a1a;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <h1>Registro</h1>

  <form id="formRegistro">

    <div class="campo">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo">
      <span class="error" id="error-nombre"></span>
    </div>

    <div class="campo">
      <label for="email">Email</label>
      <input type="text" id="email" placeholder="tu@email.com">
      <span class="error" id="error-email"></span>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      <span class="error" id="error-password"></span>
    </div>

    <button type="submit">Registrarse</button>

  </form>

  <p id="exito"></p>

  <script>
    // TODO: Escribí las funciones de validación:
    //   validarNombre(valor)  → null si está bien, o string con el error
    function validarNombre(valor){
      if (valor.trim().length === 0){
        return `EL nombre no puede estar vacio`
      }
      return null
    }
    //   validarEmail(valor)   → null si está bien, o string con el error
    function validarEmail(valor){
      if (valor.includes(`@`)){
        return null
      }
      return `El mail tiene que contener @`
    }

    //   validarPassword(valor)→ null si está bien, o string con el error
    function validarPassword(valor){
      if(valor.trim().length >= 6){
        return null
      }
      return `La contraseña debe tener minimo 6 caracteres`
    }

    // TODO: Escuchá el evento submit del formulario.
    //   1. Llamá e.preventDefault()
    //   2. Leé los tres campos con .value
    //   3. Validá cada uno
    //   4. Mostrá los errores en los <span class="error"> correspondientes
    //   5. Si todo es válido, mostrá el mensaje de éxito en #exito

    const form = document.querySelector("#formRegistro");
    const exito=document.getElementById("exito")
    const errorNombreTexto=document.getElementById("error-nombre")
    const errorMailTexto=document.getElementById("error-email")
    const errorPasswordTexto=document.getElementById("error-password")

    
    

    form.addEventListener("submit", (e) => {
    e.preventDefault();
    const nombre   = document.querySelector("#nombre").value;
    const nombreError = validarNombre(nombre)
      
    const email    = document.querySelector("#email").value;
    const emailError = validarEmail(email)

    const password = document.querySelector("#password").value;
    const passwordError = validarPassword(password)

    if (!nombreError && !emailError && !passwordError) {
      errorNombreTexto.textContent = ``;
      errorMailTexto.textContent = ``;
      errorPasswordTexto.textContent = ``;
      exito.textContent=`Bienvenido ${nombre}`
    }
    
    if(nombreError){errorNombreTexto.textContent=nombreError}
    if(emailError){errorMailTexto.textContent=emailError}
    if(passwordError){errorPasswordTexto.textContent=passwordError}
      // --- Completar desde acá ---
    });
  </script>

</body>
</html>
