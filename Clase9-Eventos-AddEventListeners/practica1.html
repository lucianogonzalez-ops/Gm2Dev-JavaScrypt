<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    
</head>
<body>
    <button id="botonGoles">
        <span id="golesMarcador">Cantidad de goles : 0</span>
    </button>
    



    <script>
        let goles = 0 ;
        const golesBoton = document.getElementById("botonGoles")
        const marcador=document.getElementById("golesMarcador")
        golesBoton.addEventListener("click",()=>{
            goles++
            marcador.textContent=(`Cantidad de goles : ${goles}`)


        })

    </script>
    
</body>
</html>
