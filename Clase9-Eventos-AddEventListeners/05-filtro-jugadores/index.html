<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 05 — Filtro de jugadores</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 3rem auto;
      padding: 0 1rem;
    }
    input {
      font-size: 1.1rem;
      padding: 0.5rem;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 1rem;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 0.5rem 1rem;
      margin-bottom: 0.4rem;
      background-color: #f0f0f0;
      border-radius: 4px;
    }
    .oculto{
      display: none;
    }


  </style>
</head>
<body>
  <h1>Buscar jugador</h1>

  <input id="buscador" placeholder="Escribí para filtrar...">

  <ul id="lista"></ul>

  <script>
    const jugadoresLista = [
      "Lionel Messi",
      "Emiliano Martínez",
      "Julián Álvarez",
      "Enzo Fernández",
      "Rodrigo De Paul",
      "Ángel Di María",
      "Cristiano Ronaldo",
      "Kylian Mbappé",
    ];

    // Tu código acá:


    const input = document.getElementById("buscador");
    const  output = document.getElementById("lista");
    jugadoresLista.forEach((element)=>{
      const jugador=document.createElement("li")
        jugador.textContent=element
        jugador.classList.add("oculto")
        output.appendChild(jugador);
    })
    input.addEventListener("input",(event)=>{
      const jugador = event.target.value.toLowerCase();
      for(const jugadores of output.children){
          const jugadorBuscado = jugadores.textContent.toLowerCase();
          if(jugadorBuscado.includes(jugador)){
            jugadores.classList.remove("oculto");
          }else{
            jugadores.classList.add("oculto");
          }
      }
    })



    

  
    // 1. Renderizá la lista: un <li> por jugador, agregado al #lista
    // 2. Escuchá el evento "input" del #buscador
    // 3. Mostrá/ocultá cada <li> según si coincide con lo tipeado (sin importar mayúsculas)
  </script>
</body>
</html>
