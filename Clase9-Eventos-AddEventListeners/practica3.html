<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <input id="inputNombre" type="">
<span id="muestraDeSaludo">Buenas tardes</span>



    <script>
        const inputNombre=document.getElementById("inputNombre")
        const outputSaludo=document.getElementById("muestraDeSaludo")

        inputNombre.addEventListener("input", ()=>{
            outputSaludo.textContent = (`Buenas tardes ${event.target.value || "..."}`);
        })
    </script>
</body>
</html>
