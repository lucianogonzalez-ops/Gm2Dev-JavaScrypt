  <title>Modo oscuro</title>
  <style>
    /* Tema claro (por defecto) */
    body {
      font-family: sans-serif;
      background-color: #ffffff;
      color: #111111;
      padding: 2rem;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Tema oscuro: se activa cuando <body> tiene la clase "oscuro" */
    body.oscuro {
      background-color: #1a1a2e;
      color: #e0e0e0;
    }

    button {
      font-size: 1rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }
  </style>
</head>
