<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 01 — Datos que se van</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 60px auto;
      padding: 0 20px;
    }
    input {
      padding: 8px;
      font-size: 1rem;
      width: 200px;
    }
    button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
      margin-left: 8px;
    }
    #saludo {
      margin-top: 24px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>¿Cómo te llamás?</h1>

  <input type="text" id="input-nombre" placeholder="Tu nombre">
  <button id="btn-guardar">Guardar</button>
  <button id="btn-borrar">Borrar</button>

  <p id="saludo">Ingresá tu nombre.</p>

  <script>
    const inputNombre = document.querySelector("#input-nombre");
    const saludo = document.querySelector("#saludo");
    const btnGuardar = document.querySelector("#btn-guardar");
    const btnBorrar = document.querySelector("#btn-borrar");
    
    // TODO 1: Al cargar la página, leer el nombre guardado y mostrar el saludo.

    
    const texto = localStorage.getItem("nombre");
    if(texto){
        saludo.textContent=(`Buenas ${texto}`)

    }
    // TODO 2: Al hacer click en Guardar, guardar el nombre en localStorage
    //         y actualizar el saludo.
    btnGuardar.addEventListener("click", () => {
      localStorage.setItem("nombre", inputNombre.value);
      const texto = localStorage.getItem("nombre");
      saludo.textContent=(`Buenas ${texto}`)

    });

    // TODO 3: Al hacer click en Borrar, eliminar el nombre de localStorage
    //         y volver al texto por defecto.
    btnBorrar.addEventListener("click", () => {
      localStorage.removeItem("nombre");
      saludo.textContent=`Ingresá tu nombre.`
      inputNombre.value=``
      


      // tu código acá
    });
  </script>
</body>
</html>
